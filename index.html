<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea house project</title>


    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font manrope -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <!-- fav-icnon  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Manrope", sans-serif;
        }
    </style>

</head>

<body>

    <section class="flex border border-red-500 container mx-auto">

        <div class="banner-left mt-16 space-y-[30px]">
            <h1 class="text-[80px] font-bold">It's Good <br>
                tea time at The <br> Tea House</h1>
            <p class="text-[18px] text-[#777777]">Tea and Botanical Solutions Supplier Give Optimum <br> Satisfaction To
                Your Taste Buds.
            </p>
            <button class="py-3 px-5 bg-linear-to-r from-[#FF8938] to-blue-[#FF3B18] rounded-md">Explore More <span><i
                        class="fa-solid fa-arrow-down -rotate-130"></i></span></button>

        </div>



        <div class="banner-right mt-16 border-3 border-amber-700 bg-amber-300 flex justify-end items-end">
            <img src="./images/banner.png" alt="Two juice bottle">
            <div class="rating border-2 border-green-600 w-[255px] h-[100px]  absolute bottom-[8rem]">
                
                5.00 <br>Trust Pilot
                Ratings
            </div>

        </div>
    </section>

</body>

</html>
